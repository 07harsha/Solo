<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Solo Leveling: Shadow Monarch Ascension</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #7c3aed;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #a855f7, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .level-display {
            background: rgba(124, 58, 237, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #7c3aed;
        }

        /* Stats Grid */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(30, 35, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .stat-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #7c3aed;
        }

        .stat-bar {
            margin-top: 12px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Form */
        .form-section, .fighting-section {
            background: rgba(30, 35, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #7c3aed;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Workout Cards */
        .workout-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .workout-card {
            background: rgba(30, 35, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(124,58,237,0.3);
            transition: all 0.2s;
            cursor: pointer;
        }

        .workout-card.completed {
            opacity: 0.6;
            background: rgba(124,58,237,0.1);
            border-color: #22c55e;
        }

        .workout-icon { font-size: 2rem; margin-bottom: 8px; }
        .workout-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
        .workout-description { color: #9ca3af; font-size: 0.85rem; margin-bottom: 12px; }
        .workout-details { display: flex; justify-content: space-between; color: #7c3aed; font-size: 0.8rem; }

        /* Fighting Skills */
        .skill-badge {
            display: inline-block;
            background: rgba(124,58,237,0.2);
            border-radius: 20px;
            padding: 6px 12px;
            margin: 4px;
            font-size: 0.8rem;
            border: 1px solid #7c3aed;
        }

        /* AI Panel */
        .ai-panel {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #7c3aed;
        }

        .ai-message {
            background: rgba(124,58,237,0.1);
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-family: monospace;
        }

        .daily-bonus {
            background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(168,85,247,0.2));
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #7c3aed;
        }

        .achievement-badge {
            background: rgba(124,58,237,0.2);
            border-radius: 20px;
            padding: 6px 12px;
            margin: 4px;
            font-size: 0.75rem;
            display: inline-block;
        }

        .error-fixer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 8px 16px;
            display: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="nav">
        <div class="logo">⚔️ SHADOW MONARCH ⚔️</div>
        <div class="level-display" id="rankDisplay">E-Rank</div>
    </div>
</div>

<div class="container">
    <div class="daily-bonus" id="dailyBonus">🎁 Daily Login Bonus Available!</div>

    <div class="form-section">
        <h3>👤 Hunter Registration</h3>
        <div class="form-group"><label>Name:</label><input type="text" id="userName" placeholder="Your name"></div>
        <div class="form-group"><label>Age:</label><input type="number" id="userAge" placeholder="Age"></div>
        <div class="form-group"><label>Weight (kg):</label><input type="number" id="userWeight" placeholder="Weight"></div>
        <div class="form-group"><label>Height (cm):</label><input type="number" id="userHeight" placeholder="Height"></div>
        <div class="form-group"><label>Fitness Level:</label>
            <select id="fitnessLevel">
                <option value="beginner">Beginner (E-Rank)</option>
                <option value="intermediate">Intermediate (D-Rank)</option>
                <option value="advanced">Advanced (C-Rank)</option>
            </select>
        </div>
        <button id="initBtn">Initialize System</button>
    </div>

    <div class="stats-section">
        <div class="stat-card"><div class="stat-title">💪 Strength</div><div class="stat-value" id="strength">0</div><div class="stat-bar"><div class="stat-fill" id="strengthBar"></div></div></div>
        <div class="stat-card"><div class="stat-title">🏃 Endurance</div><div class="stat-value" id="endurance">0</div><div class="stat-bar"><div class="stat-fill" id="enduranceBar"></div></div></div>
        <div class="stat-card"><div class="stat-title">⚡ Agility</div><div class="stat-value" id="agility">0</div><div class="stat-bar"><div class="stat-fill" id="agilityBar"></div></div></div>
        <div class="stat-card"><div class="stat-title">⭐ Experience</div><div class="stat-value" id="exp">0</div><div class="stat-bar"><div class="stat-fill" id="expBar"></div></div></div>
    </div>

    <div class="fighting-section">
        <h3>⚔️ Fighting Skills</h3>
        <div id="skillsContainer"></div>
    </div>

    <h2 class="section-title">⚔️ Daily Quests</h2>
    <div id="workoutGrid" class="workout-grid"></div>

    <div class="ai-panel">
        <div><span>🤖 SYSTEM AI</span> <span id="aiStatus">🟢 ONLINE</span></div>
        <div class="ai-message" id="aiMessage">Initializing Shadow Monarch Protocol...</div>
        <button id="aiRecommendBtn">Get AI Recommendation</button>
    </div>

    <div class="progress-section">
        <h2 class="section-title">🏆 Achievements</h2>
        <div id="achievements"></div>
        <div id="rankInfo"></div>
    </div>
</div>

<div class="error-fixer" id="errorFixer">🔧 AI Auto-Fixing...</div>

<script>
    // ------------------- Global Variables -------------------
    let userData = {
        name: "Hunter", age: 25, weight: 70, height: 170, fitnessLevel: "beginner",
        strength: 10, endurance: 10, agility: 10, exp: 0, level: 1,
        completedWorkouts: [], achievements: [], lastLogin: null, streak: 0,
        unlockedSkills: []
    };

    // Workouts database (all bodyweight)
    const workoutLibrary = {
        strength: [
            { name: "Shadow Push-ups", description: "3 sets of 15-20 push-ups", sets: 3, reps: 18, exp: 50, type: "strength", icon: "💪", difficulty: "Medium" },
            { name: "Monarch Squats", description: "3 sets of 25 bodyweight squats", sets: 3, reps: 25, exp: 50, type: "strength", icon: "🦵", difficulty: "Easy" },
            { name: "Dagger Lunges", description: "3 sets of 12 lunges per leg", sets: 3, reps: 12, exp: 45, type: "strength", icon: "🗡️", difficulty: "Medium" },
            { name: "Wall Sit", description: "Hold 60 sec, 3 sets", sets: 3, duration: 60, exp: 55, type: "strength", icon: "🧱", difficulty: "Hard" },
            { name: "Tricep Dips", description: "3 sets of 12-15 dips (chair)", sets: 3, reps: 14, exp: 50, type: "strength", icon: "🪑", difficulty: "Medium" },
            { name: "Plank Hold", description: "Hold 90 seconds", duration: 90, exp: 60, type: "strength", icon: "📏", difficulty: "Hard" }
        ],
        endurance: [
            { name: "Eternal Running", description: "30 min jogging in place", duration: 30, exp: 80, type: "endurance", icon: "🏃", difficulty: "Medium" },
            { name: "Burpee Rush", description: "4 sets of 15 burpees", sets: 4, reps: 15, exp: 70, type: "endurance", icon: "🤸", difficulty: "Hard" },
            { name: "Mountain Climbers", description: "4 sets of 45 sec", sets: 4, duration: 45, exp: 65, type: "endurance", icon: "⛰️", difficulty: "Medium" },
            { name: "High Knees", description: "5 sets of 60 sec", sets: 5, duration: 60, exp: 70, type: "endurance", icon: "🦵", difficulty: "Hard" },
            { name: "Jumping Jacks", description: "150 reps total", reps: 150, exp: 60, type: "endurance", icon: "⭐", difficulty: "Easy" }
        ],
        agility: [
            { name: "Shadow Steps", description: "Agility ladder drills 15 min", duration: 15, exp: 60, type: "agility", icon: "👣", difficulty: "Medium" },
            { name: "Box Jumps", description: "3 sets of 15 jumps (low surface)", sets: 3, reps: 15, exp: 65, type: "agility", icon: "📦", difficulty: "Hard" },
            { name: "Speed Skaters", description: "4 sets of 20 reps", sets: 4, reps: 20, exp: 60, type: "agility", icon: "⛸️", difficulty: "Medium" },
            { name: "Crab Walks", description: "3 sets of 25 meters", sets: 3, exp: 55, type: "agility", icon: "🦀", difficulty: "Easy" },
            { name: "Lateral Shuffles", description: "4 sets of 45 sec", sets: 4, duration: 45, exp: 65, type: "agility", icon: "↔️", difficulty: "Medium" }
        ]
    };

    let currentWorkouts = []; // will be filled with a mix of workouts each day

    // Fighting skills database (unlock by level)
    const fightingSkills = [
        { name: "Shadow Step", description: "Evade attacks with supernatural speed", levelReq: 3, statBonus: { agility: 5 } },
        { name: "Dagger Strike", description: "Precise and lethal attack", levelReq: 5, statBonus: { strength: 5 } },
        { name: "Monarch's Endurance", description: "Never tire in battle", levelReq: 8, statBonus: { endurance: 5 } },
        { name: "Dark Barrier", description: "Summon a protective shield", levelReq: 12, statBonus: { strength: 8, endurance: 5 } },
        { name: "Shadow Army", description: "Summon shadows to fight alongside", levelReq: 20, statBonus: { strength: 10, agility: 10 } },
        { name: "Arise", description: "Revive fallen enemies as allies", levelReq: 30, statBonus: { strength: 15, endurance: 15, agility: 15 } }
    ];

    // Helper functions
    function haptic(style = 'light') {
        if (window.navigator && window.navigator.vibrate) {
            if (style === 'light') window.navigator.vibrate(10);
            else if (style === 'medium') window.navigator.vibrate(20);
            else if (style === 'heavy') window.navigator.vibrate([30, 50, 30]);
        }
    }

    function playSound(type) {
        // Optional: Web Audio beep (we'll keep simple beep)
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!window.audioCtx) window.audioCtx = new AudioContext();
            const ctx = window.audioCtx;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            if (type === 'levelup') { osc.frequency.value = 880; gain.gain.value = 0.2; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5); osc.stop(ctx.currentTime + 0.5); }
            else if (type === 'complete') { osc.frequency.value = 440; gain.gain.value = 0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3); }
        } catch(e) { console.log("Audio not supported"); }
    }

    function saveUserData() { localStorage.setItem('soloLevelingData', JSON.stringify(userData)); }
    function loadUserData() { const saved = localStorage.getItem('soloLevelingData'); if (saved) { const parsed = JSON.parse(saved); userData = { ...userData, ...parsed }; } }

    // Daily workout reset: selects 3 random workouts from each category (or all if less)
    function refreshDailyWorkouts() {
        const today = new Date().toDateString();
        const storedDate = localStorage.getItem('workoutDate');
        if (storedDate === today && localStorage.getItem('dailyWorkouts')) {
            currentWorkouts = JSON.parse(localStorage.getItem('dailyWorkouts'));
        } else {
            // Generate new daily set: pick 2 from each category (to keep total manageable)
            const shuffled = (arr) => [...arr].sort(() => 0.5 - Math.random());
            const strengthPick = shuffled(workoutLibrary.strength).slice(0, 2);
            const endurancePick = shuffled(workoutLibrary.endurance).slice(0, 2);
            const agilityPick = shuffled(workoutLibrary.agility).slice(0, 2);
            currentWorkouts = [...strengthPick, ...endurancePick, ...agilityPick];
            localStorage.setItem('dailyWorkouts', JSON.stringify(currentWorkouts));
            localStorage.setItem('workoutDate', today);
        }
        // Also reset completed workouts for the day
        userData.completedWorkouts = [];
        renderWorkouts();
        saveUserData();
    }

    // Complete workout
    function completeWorkout(workout) {
        if (userData.completedWorkouts.includes(workout.name)) {
            displayAIMessage("You already completed this today. Rest, Hunter.");
            haptic('light');
            return;
        }
        haptic('medium');
        playSound('complete');

        userData.exp += workout.exp;
        userData.completedWorkouts.push(workout.name);
        if (workout.type === 'strength') userData.strength += Math.floor(workout.exp / 20);
        if (workout.type === 'endurance') userData.endurance += Math.floor(workout.exp / 20);
        if (workout.type === 'agility') userData.agility += Math.floor(workout.exp / 20);

        // Achievements
        const count = userData.completedWorkouts.length;
        if (count === 1) addAchievement("First Blood - Completed First Quest!");
        if (count === 5) addAchievement("Warrior's Path - 5 Quests Completed!");
        if (count === 15) addAchievement("Shadow Veteran - 15 Quests Completed!");
        if (count === 30) addAchievement("Monarch's Disciple - 30 Quests Completed!");

        saveUserData();
        updateStats();
        renderWorkouts();
        checkLevelUp();
        displayAIMessage(`✨ Completed "${workout.name}"! +${workout.exp} XP! ${workout.type.toUpperCase()} increased! ✨`);
    }

    function checkLevelUp() {
        let leveled = false;
        let needed = userData.level * 100;
        while (userData.exp >= needed) {
            userData.exp -= needed;
            userData.level++;
            leveled = true;
            addAchievement(`⭐ LEVEL UP! Reached Level ${userData.level}! ⭐`);
            displayAIMessage(`⚡ LEVEL UP! You are now Level ${userData.level}! ⚡`);
            haptic('heavy');
            playSound('levelup');
            needed = userData.level * 100;
        }
        if (leveled) {
            updateStats();
            updateRank();
            checkSkillUnlocks();
        }
    }

    function checkSkillUnlocks() {
        let changed = false;
        fightingSkills.forEach(skill => {
            if (userData.level >= skill.levelReq && !userData.unlockedSkills.includes(skill.name)) {
                userData.unlockedSkills.push(skill.name);
                // apply stat bonus
                if (skill.statBonus.strength) userData.strength += skill.statBonus.strength;
                if (skill.statBonus.endurance) userData.endurance += skill.statBonus.endurance;
                if (skill.statBonus.agility) userData.agility += skill.statBonus.agility;
                addAchievement(`🎯 Unlocked Skill: ${skill.name}!`);
                changed = true;
            }
        });
        if (changed) {
            updateStats();
            renderSkills();
            saveUserData();
        }
    }

    function renderSkills() {
        const container = document.getElementById('skillsContainer');
        if (!container) return;
        if (userData.unlockedSkills.length === 0) {
            container.innerHTML = '<p>No skills yet. Reach level 3 to unlock your first skill!</p>';
            return;
        }
        const skillsHtml = userData.unlockedSkills.map(skill => {
            const skillInfo = fightingSkills.find(s => s.name === skill);
            return `<div class="skill-badge">${skill} ${skillInfo ? `(Lv.${skillInfo.levelReq})` : ''}</div>`;
        }).join('');
        container.innerHTML = skillsHtml;
    }

    function addAchievement(ach) {
        if (!userData.achievements.includes(ach)) {
            userData.achievements.unshift(ach);
            if (userData.achievements.length > 20) userData.achievements.pop();
            updateAchievements();
            displayAIMessage(`🏆 ${ach} 🏆`);
            haptic('medium');
        }
    }

    function updateAchievements() {
        const div = document.getElementById('achievements');
        if (!div) return;
        if (userData.achievements.length === 0) div.innerHTML = '<p>Complete quests to earn achievements.</p>';
        else div.innerHTML = userData.achievements.map(a => `<span class="achievement-badge">🏆 ${a}</span>`).join('');
    }

    function updateStats() {
        document.getElementById('strength').innerText = Math.floor(userData.strength);
        document.getElementById('endurance').innerText = Math.floor(userData.endurance);
        document.getElementById('agility').innerText = Math.floor(userData.agility);
        document.getElementById('exp').innerText = `${Math.floor(userData.exp)}/${userData.level * 100}`;
        document.getElementById('strengthBar').style.width = `${Math.min((userData.strength/150)*100,100)}%`;
        document.getElementById('enduranceBar').style.width = `${Math.min((userData.endurance/150)*100,100)}%`;
        document.getElementById('agilityBar').style.width = `${Math.min((userData.agility/150)*100,100)}%`;
        document.getElementById('expBar').style.width = `${(userData.exp/(userData.level*100))*100}%`;
    }

    function getRankName() {
        if (userData.level < 5) return "E-Rank Hunter";
        if (userData.level < 10) return "D-Rank Hunter";
        if (userData.level < 20) return "C-Rank Hunter";
        if (userData.level < 35) return "B-Rank Hunter";
        if (userData.level < 50) return "A-Rank Hunter";
        if (userData.level < 75) return "S-Rank Hunter";
        return "👑 SHADOW MONARCH 👑";
    }

    function updateRank() {
        document.getElementById('rankDisplay').innerHTML = getRankName();
        document.getElementById('rankInfo').innerHTML = `<div class="stat-card">⭐ ${getRankName()} | Level ${userData.level} | Quests: ${userData.completedWorkouts.length} ⭐</div>`;
    }

    function renderWorkouts() {
        const grid = document.getElementById('workoutGrid');
        if (!grid) return;
        grid.innerHTML = currentWorkouts.map(workout => `
            <div class="workout-card ${userData.completedWorkouts.includes(workout.name) ? 'completed' : ''}" data-name="${workout.name}">
                <div class="workout-icon">${workout.icon}</div>
                <div class="workout-name">${workout.name}</div>
                <div class="workout-description">${workout.description}</div>
                <div class="workout-details">
                    <span>⚡ ${workout.exp} XP</span>
                    <span>🎯 ${workout.difficulty}</span>
                    <span>${workout.sets ? workout.sets+' sets' : ''} ${workout.duration ? workout.duration+' sec' : ''} ${workout.reps ? workout.reps+' reps' : ''}</span>
                </div>
            </div>
        `).join('');

        // Attach event listeners dynamically
        document.querySelectorAll('.workout-card').forEach(card => {
            const name = card.getAttribute('data-name');
            const workout = currentWorkouts.find(w => w.name === name);
            if (workout) {
                card.addEventListener('click', () => completeWorkout(workout));
            }
        });
    }

    function displayAIMessage(msg) {
        const aiMsg = document.getElementById('aiMessage');
        if (aiMsg) aiMsg.innerHTML = `🤖 ${msg}`;
    }

    function getAIRecommendation() {
        const incomplete = currentWorkouts.filter(w => !userData.completedWorkouts.includes(w.name));
        if (incomplete.length === 0) {
            displayAIMessage("All quests done! Rest or wait for tomorrow's new quests.");
            return;
        }
        const stats = { strength: userData.strength, endurance: userData.endurance, agility: userData.agility };
        let weakest = Object.keys(stats).reduce((a,b) => stats[a] < stats[b] ? a : b);
        let rec = incomplete.find(w => w.type === weakest) || incomplete[0];
        displayAIMessage(`Analysis: Weakest is ${weakest}. Recommended: "${rec.name}" - ${rec.description}. Complete it to grow!`);
        haptic('light');
    }

    function updateUserProfile() {
        const name = document.getElementById('userName').value || "Hunter";
        const age = parseInt(document.getElementById('userAge').value) || 25;
        const weight = parseFloat(document.getElementById('userWeight').value) || 70;
        const height = parseFloat(document.getElementById('userHeight').value) || 170;
        const fitnessLevel = document.getElementById('fitnessLevel').value;

        userData.name = name; userData.age = age; userData.weight = weight; userData.height = height; userData.fitnessLevel = fitnessLevel;
        let base = 10; if (fitnessLevel === 'intermediate') base = 20; if (fitnessLevel === 'advanced') base = 35;
        userData.strength = base; userData.endurance = base; userData.agility = base;
        saveUserData();
        updateStats();
        displayAIMessage(`Profile updated! Welcome ${userData.name}. Rank: ${getRankName()}`);
        haptic('light');
    }

    function checkDailyBonus() {
        const today = new Date().toDateString();
        if (userData.lastLogin !== today) {
            const bonus = 50 + (userData.streak * 10);
            userData.exp += bonus;
            userData.streak = (userData.lastLogin === new Date(Date.now() - 86400000).toDateString()) ? userData.streak + 1 : 1;
            userData.lastLogin = today;
            addAchievement(`🔥 ${userData.streak} Day Streak! +${bonus} XP`);
            displayAIMessage(`Daily Bonus! +${bonus} XP | Streak: ${userData.streak} days!`);
            document.getElementById('dailyBonus').innerHTML = `🎁 Bonus Claimed! +${bonus} XP | Streak: ${userData.streak} 🔥`;
            setTimeout(() => { document.getElementById('dailyBonus').innerHTML = '🎁 Come back tomorrow for more rewards!'; }, 4000);
            saveUserData();
            updateStats();
            checkLevelUp();
        } else {
            document.getElementById('dailyBonus').innerHTML = `🎁 Daily bonus already claimed. Streak: ${userData.streak} days 🔥`;
        }
    }

    function fixErrors() {
        const fixDiv = document.getElementById('errorFixer');
        fixDiv.style.display = 'block';
        if (userData.strength < 0) userData.strength = 0;
        if (userData.endurance < 0) userData.endurance = 0;
        if (userData.agility < 0) userData.agility = 0;
        if (userData.exp < 0) userData.exp = 0;
        userData.completedWorkouts = userData.completedWorkouts.filter(w => currentWorkouts.some(cw => cw.name === w));
        saveUserData();
        updateStats();
        setTimeout(() => fixDiv.style.display = 'none', 2000);
    }

    function init() {
        loadUserData();
        refreshDailyWorkouts();  // sets currentWorkouts and resets completed for new day
        checkDailyBonus();
        updateStats();
        updateRank();
        updateAchievements();
        renderSkills();
        checkSkillUnlocks();
        displayAIMessage("System online. Begin your journey to become the Shadow Monarch!");
        setInterval(() => fixErrors(), 30000);
        // Attach UI buttons
        document.getElementById('initBtn').addEventListener('click', updateUserProfile);
        document.getElementById('aiRecommendBtn').addEventListener('click', getAIRecommendation);
        // Enable haptics on first user interaction (iOS requires user gesture for vibration? but we'll try)
        document.body.addEventListener('touchstart', () => { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(1); }, { once: true });
    }

    init();
</script>
</body>
</html>
